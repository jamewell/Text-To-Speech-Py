services:
  backend:
    build:
      context: ../backend
    container_name: tts-backend
    command: ["fastapi", "dev", "main.py", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "${BACKEND_PORT}:8000"  # ← Uses .env variable
    env_file: .env  # ← Load all variables
    depends_on:
      - postgres
      - redis
      - minio

  frontend:
    build:
      context: ../frontend
    container_name: tts-frontend
    command: ["npm", "run", "dev", "--", "--host"]
    volumes:
      - ../frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

  postgres:
    image: postgres:15
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: tts-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: tts-minio
    env_file: .env
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  celery:
    build:
      context: ../backend
    container_name: tts-celery
    env_file: ./.env
    command: ["celery", "-A", "worker.celery_app:celery_app", "worker", "--loglevel=info", "-Q", "pdf_processing,tts_processing,tts_default"]
    volumes:
      - ../backend:/app
    depends_on:
      - backend
      - redis
      - postgres

volumes:
  pgdata:
  minio_data:
